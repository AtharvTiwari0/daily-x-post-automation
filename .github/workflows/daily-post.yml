name: Daily AI X Post Automation

on:
  schedule:
    # 2:40 PM IST is 9:10 AM UTC (IST is UTC + 5:30)
    - cron: '10 9 * * *'
  workflow_dispatch: # Enable manual run from GitHub UI

jobs:
  run-automation:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential for pushing updated history.json and logs back to repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Trend Curation & Post Generation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm start

      - name: Commit and Push History & Logs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add only history and logs
          git add history/history.json logs/ || true
          
          # Commit only if there are changes
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes in history or logs to commit."
          else
            git commit -m "Update daily post history and execution logs [skip ci]"
            git push
          fi
